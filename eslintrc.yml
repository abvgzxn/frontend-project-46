env:
  node: true
  es2021: true
  jest: true

extends: airbnb-base

parserOptions:
  ecmaVersion: latest
  sourceType: module

rules:
  no-console: off
  import/extensions:
    - error
    - ignorePackages
  no-underscore-dangle:
    - error
    - allow:
        - __dirname
        - __filename
  max-len:
    - error
    - code: 120
      ignoreComments: true